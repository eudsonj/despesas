<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyFinance • Inteligência Financeira e Open Finance</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #050505;
    }
    ::-webkit-scrollbar-thumb {
      background: #1c1c1e;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #2c2c2e;
    }

    /* Print Stylesheet for PDF/Print Exports */
    @media print {
      body {
        background: #ffffff !important;
        color: #000000 !important;
      }
      .no-print {
        display: none !important;
      }
      .print-only {
        display: block !important;
      }
      .print-card {
        border: 1px solid #e2e8f0 !important;
        background: #ffffff !important;
        color: #000000 !important;
        box-shadow: none !important;
      }
    }

    /* Custom Animation classes */
    .animate-pulse-slow {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
  </style>
</head>
<body class="bg-[#050505] text-[#e4e4e7] font-sans antialiased selection:bg-cyan-500 selection:text-black">

  <div id="root"></div>

  <!-- React 18, ReactDOM 18, and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // React Wrapper for Lucide Icons
    function Icon({ name, className = "w-4 h-4 text-slate-400" }) {
      const iconRef = useRef(null);

      useEffect(() => {
        if (iconRef.current && window.lucide) {
          try {
            window.lucide.createIcons();
          } catch (err) {
            console.warn("Lucide rendering error:", err);
          }
        }
      }, [name]);

      return <i ref={iconRef} data-lucide={name} className={className}></i>;
    }

    // Main App Component
    function App() {
      // -----------------------------------------------------------------
      // Persistent States (loads from LocalStorage, falls back to mock)
      // -----------------------------------------------------------------
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [pin, setPin] = useState("");
      const [pinError, setPinError] = useState("");

      const [transactions, setTransactions] = useState(() => {
        const saved = localStorage.getItem("easyfinance_transactions") || localStorage.getItem("balanzy_transactions");
        return saved ? JSON.parse(saved) : [
          { id: "t1", type: "income", category: "Serviços", amount: 4800, currency: "BRL", description: "Desenvolvimento Frontend", date: "2026-06-03" },
          { id: "t2", type: "expense", category: "Alimentação", amount: 65.5, currency: "BRL", description: "Supermercado Pão de Açúcar", date: "2026-06-10" },
          { id: "t3", type: "expense", category: "Transporte", amount: 45, currency: "USD", description: "Viagem Uber EUA", date: "2026-06-12" },
          { id: "t4", type: "income", category: "Serviços", amount: 350, currency: "EUR", description: "Consultoria Internacional Alemanha", date: "2026-06-14" },
          { id: "t5", type: "expense", category: "Lazer", amount: 120, currency: "BRL", description: "Cinema e restaurante", date: "2026-06-15" }
        ];
      });

      const [boletos, setBoletos] = useState(() => {
        const saved = localStorage.getItem("easyfinance_boletos") || localStorage.getItem("balanzy_boletos");
        return saved ? JSON.parse(saved) : [
          { id: "b1", title: "Condomínio Edifício", amount: 450, currency: "BRL", dueDate: "2026-06-20", paid: false, category: "Moradia", barcode: "34191.79001 01043.513184 91020.150008 7 97540000045000" },
          { id: "b2", title: "Internet Fibra Vivo", amount: 129.9, currency: "BRL", dueDate: "2026-06-25", paid: false, category: "Serviços", barcode: "03399.79001 01043.513184 91020.150008 7 97540000012990" },
          { id: "b3", title: "Seguro de Saúde", amount: 380, currency: "BRL", dueDate: "2026-06-15", paid: true, category: "Saúde", barcode: "00191.79001 01043.513184 91020.150008 7 97540000038000" }
        ];
      });

      const [banks, setBanks] = useState(() => {
        const saved = localStorage.getItem("easyfinance_banks") || localStorage.getItem("balanzy_banks");
        return saved ? JSON.parse(saved) : [
          { id: "acc-1", bankName: "Nubank", balance: 1450.5, currency: "BRL", isConnected: true, accountNumber: "835251-2", color: "purple" },
          { id: "acc-2", bankName: "Itaú", balance: 5200, currency: "BRL", isConnected: false, accountNumber: "20451-9", color: "orange" },
          { id: "acc-3", bankName: "Inter", balance: 350, currency: "USD", isConnected: false, accountNumber: "91025-0", color: "orange" }
        ];
      });

      const [backupLogs, setBackupLogs] = useState(() => {
        const saved = localStorage.getItem("easyfinance_backups") || localStorage.getItem("balanzy_backups");
        return saved ? JSON.parse(saved) : [
          { id: "l1", provider: "EasyFinance Secure Cloud", date: "2026-06-16T10:30:00Z", sizeStr: "12 KB", status: "success" }
        ];
      });

      // -----------------------------------------------------------------
      // UI / State Managers
      // -----------------------------------------------------------------
      const [selectedCurrency, setSelectedCurrency] = useState("BRL");
      const [deviceLayout, setDeviceLayout] = useState("desktop"); // desktop or mobile viewport
      const [notification, setNotification] = useState("");
      const [isOffline, setIsOffline] = useState(false);

      // AI Chat State
      const [aiMessages, setAiMessages] = useState([
        { id: "m1", sender: "ai", text: "Olá! Sou seu assistente de Inteligência Financeira EasyFinance GPT. Como posso te ajudar hoje? Posso analisar seus gastos, verificar boletos pendentes ou dar dicas de economia." }
      ]);
      const [aiInput, setAiInput] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const chatEndRef = useRef(null);

      // New transaction inputs
      const [txDesc, setTxDesc] = useState("");
      const [txType, setTxType] = useState("expense");
      const [txCategory, setTxCategory] = useState("Alimentação");
      const [txAmount, setTxAmount] = useState("");
      const [txCurrency, setTxCurrency] = useState("BRL");
      const [txAccount, setTxAccount] = useState("Local");

      // Open Finance Connect Modal
      const [showConnectModal, setShowConnectModal] = useState(false);
      const [selectedBank, setSelectedBank] = useState(null);
      const [bankAgency, setBankAgency] = useState("");
      const [bankAccountNum, setBankAccountNum] = useState("");
      const [bankPassword, setBankPassword] = useState("");
      const [isConnecting, setIsConnecting] = useState(false);

      // New manual Boleto form
      const [showAddBoleto, setShowAddBoleto] = useState(false);
      const [boletoTitle, setBoletoTitle] = useState("");
      const [boletoValue, setBoletoValue] = useState("");
      const [boletoDate, setBoletoDate] = useState("");
      const [boletoCategory, setBoletoCategory] = useState("Moradia");

      // Filter state for transaction logs list
      const [filterCategory, setFilterCategory] = useState("todas");
      const [filterType, setFilterType] = useState("todos");

      // Currencies Exchange Rates Configuration (Base is BRL)
      const exchangeRates = {
        BRL: { symbol: "R$", rateToBRL: 1, name: "Real Brasileiro" },
        USD: { symbol: "$", rateToBRL: 5.42, name: "Dólar Comercial" },
        EUR: { symbol: "€", rateToBRL: 5.85, name: "Euro" },
        GBP: { symbol: "£", rateToBRL: 6.90, name: "Libra Esterlina" }
      };

      // -----------------------------------------------------------------
      // Effects for Persistency
      // -----------------------------------------------------------------
      useEffect(() => {
        localStorage.setItem("easyfinance_transactions", JSON.stringify(transactions));
      }, [transactions]);

      useEffect(() => {
        localStorage.setItem("easyfinance_boletos", JSON.stringify(boletos));
      }, [boletos]);

      useEffect(() => {
        localStorage.setItem("easyfinance_banks", JSON.stringify(banks));
      }, [banks]);

      useEffect(() => {
        localStorage.setItem("easyfinance_backups", JSON.stringify(backupLogs));
      }, [backupLogs]);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [aiMessages, aiLoading]);

      // -----------------------------------------------------------------
      // Financial Calculation Helper Functions
      // -----------------------------------------------------------------
      const convertVal = (amount, from, to) => {
        if (from === to) return amount;
        const inBRL = amount * (exchangeRates[from]?.rateToBRL || 1);
        return inBRL / (exchangeRates[to]?.rateToBRL || 1);
      };

      // Calculate totals in currently selected display currency
      const totalIncome = useMemo(() => {
        return transactions
          .filter(t => t.type === "income")
          .reduce((sum, t) => sum + convertVal(t.amount, t.currency, selectedCurrency), 0);
      }, [transactions, selectedCurrency]);

      const totalExpense = useMemo(() => {
        return transactions
          .filter(t => t.type === "expense")
          .reduce((sum, t) => sum + convertVal(t.amount, t.currency, selectedCurrency), 0);
      }, [transactions, selectedCurrency]);

      const netBalance = totalIncome - totalExpense;

      // Expense Category breakdown for Chart
      const categoryTotals = useMemo(() => {
        const breakdown = {};
        transactions
          .filter(t => t.type === "expense")
          .forEach(t => {
            const valInDisplayCurrency = convertVal(t.amount, t.currency, selectedCurrency);
            breakdown[t.category] = (breakdown[t.category] || 0) + valInDisplayCurrency;
          });
        return breakdown;
      }, [transactions, selectedCurrency]);

      // -----------------------------------------------------------------
      // PIN Security Actions
      // -----------------------------------------------------------------
      const handleKeyPress = (num) => {
        setPinError("");
        if (pin.length < 4) {
          const nextPin = pin + num;
          setPin(nextPin);
          
          if (nextPin === "1505") {
            setTimeout(() => {
              setIsUnlocked(true);
              setPin("");
              showToast("Acesso autorizado com sucesso!");
            }, 150);
          } else if (nextPin.length === 4) {
            setTimeout(() => {
              setPinError("PIN incorreto! Dica: utilize o código 1505.");
              setPin("");
            }, 250);
          }
        }
      };

      const handleClearPin = () => {
        setPin("");
        setPinError("");
      };

      // -----------------------------------------------------------------
      // App Custom Operations
      // -----------------------------------------------------------------
      const showToast = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(""), 4000);
      };

      // Add custom Manual Transaction
      const handleAddTransaction = (e) => {
        e.preventDefault();
        if (!txDesc.trim() || !txAmount) return;

        const amountNum = parseFloat(txAmount);
        if (isNaN(amountNum) || amountNum <= 0) return;

        const newTx = {
          id: "t_" + Math.random().toString(36).substring(2, 9),
          type: txType,
          category: txCategory,
          amount: amountNum,
          currency: txCurrency,
          description: txDesc,
          date: new Date().toISOString().split("T")[0],
          bankAccount: txAccount !== "Local" ? txAccount : undefined
        };

        setTransactions(prev => [newTx, ...prev]);

        // If a connected account was chosen, modify its balance
        if (txAccount !== "Local") {
          setBanks(prev => prev.map(acc => {
            if (acc.bankName === txAccount) {
              const inAccCurrency = convertVal(amountNum, txCurrency, acc.currency);
              const sign = txType === "income" ? 1 : -1;
              return { ...acc, balance: acc.balance + (inAccCurrency * sign) };
            }
            return acc;
          }));
        }

        setTxDesc("");
        setTxAmount("");
        showToast(`Lançamento "${txDesc}" adicionado com sucesso!`);
      };

      // Delete an existing transaction
      const handleDeleteTransaction = (id) => {
        const tx = transactions.find(t => t.id === id);
        if (!tx) return;
        setTransactions(prev => prev.filter(t => t.id !== id));
        showToast("Lançamento removido com sucesso.");
      };

      // Pay a pending Boleto
      const handlePayBoleto = (boleto) => {
        setBoletos(prev => prev.map(b => b.id === boleto.id ? { ...b, paid: true } : b));
        
        // Register transaction in history
        const newTx = {
          id: "t_" + Math.random().toString(36).substring(2, 9),
          type: "expense",
          category: boleto.category,
          amount: boleto.amount,
          currency: boleto.currency,
          description: `Pagamento de boleto: ${boleto.title}`,
          date: new Date().toISOString().split("T")[0]
        };

        setTransactions(prev => [newTx, ...prev]);
        showToast(`Boleto "${boleto.title}" pago e debitado do saldo!`);
      };

      // Delete a boleto
      const handleDeleteBoleto = (id) => {
        setBoletos(prev => prev.filter(b => b.id !== id));
        showToast("Boleto removido.");
      };

      // Create custom Boleto
      const handleCreateBoleto = (e) => {
        e.preventDefault();
        if (!boletoTitle.trim() || !boletoValue || !boletoDate) return;

        const valNum = parseFloat(boletoValue);
        if (isNaN(valNum) || valNum <= 0) return;

        // Generate a random 47-digit barcode string
        const barcodeNum = Array.from({ length: 47 }, () => Math.floor(Math.random() * 10)).join("");
        const formattedBarcode = `${barcodeNum.substring(0, 5)}.${barcodeNum.substring(5, 10)} ${barcodeNum.substring(10, 15)} ${barcodeNum.substring(15, 20)} ${barcodeNum.substring(20, 25)} ${barcodeNum.substring(25, 47)}`;

        const newBoleto = {
          id: "b_" + Math.random().toString(36).substring(2, 9),
          title: boletoTitle,
          amount: valNum,
          currency: "BRL",
          dueDate: boletoDate,
          paid: false,
          category: boletoCategory,
          barcode: formattedBarcode
        };

        setBoletos(prev => [newBoleto, ...prev]);
        setBoletoTitle("");
        setBoletoValue("");
        setBoletoDate("");
        setShowAddBoleto(false);
        showToast(`Novo boleto de cobrança "${boletoTitle}" gerado com sucesso!`);
      };

      // Open Finance Connect Bank flow
      const handleOpenBankConnect = (bank) => {
        setSelectedBank(bank);
        setBankAgency("");
        setBankAccountNum("");
        setBankPassword("");
        setShowConnectModal(true);
      };

      const handleConfirmBankConnection = (e) => {
        e.preventDefault();
        if (!bankAgency || !bankAccountNum || !bankPassword) return;

        setIsConnecting(true);

        setTimeout(() => {
          setBanks(prev => prev.map(acc => {
            if (acc.bankName === selectedBank.bankName) {
              return { ...acc, isConnected: true, lastSynced: new Date().toISOString() };
            }
            return acc;
          }));

          // Import seed deposit from connected account to transaction history
          const seedDeposit = selectedBank.bankName === "Nubank" ? 1500 : selectedBank.bankName === "Itaú" ? 5000 : 800;
          const newTx = {
            id: "t_" + Math.random().toString(36).substring(2, 9),
            type: "income",
            category: "Serviços",
            amount: seedDeposit,
            currency: "BRL",
            description: `Importação Inicial Open Finance ${selectedBank.bankName}`,
            date: new Date().toISOString().split("T")[0],
            bankAccount: selectedBank.bankName
          };

          setTransactions(prev => [newTx, ...prev]);
          setIsConnecting(false);
          setShowConnectModal(false);
          showToast(`Integração Open Finance ativa com ${selectedBank.bankName}!`);
        }, 1500);
      };

      // Disconnect open finance bank API
      const handleDisconnectBank = (bankId, bankName) => {
        setBanks(prev => prev.map(acc => acc.id === bankId ? { ...acc, isConnected: false } : acc));
        showToast(`Conexão com ${bankName} encerrada.`);
      };

      // Backup Cloud Integration Logger
      const handleTriggerCloudBackup = () => {
        const sizeNum = Math.floor(10 + Math.random() * 40);
        const newLog = {
          id: "bkp_" + Math.random().toString(36).substring(2, 9),
          provider: "EasyFinance Secure Cloud",
          date: new Date().toISOString(),
          sizeStr: `${sizeNum} KB`,
          status: "success"
        };
        setBackupLogs(prev => [...prev, newLog]);
        showToast("Backup redundante criptografado com sucesso!");
      };

      // Export transaction statement as beautiful CSV File
      const handleExportCSV = () => {
        let csvContent = "\uFEFF"; // UTF-8 Byte Order Mark
        csvContent += "ID;Tipo;Descricao;Categoria;Valor;Moeda;Data;Conta Bancaria\n";

        transactions.forEach(t => {
          const row = [
            t.id,
            t.type === "income" ? "Receita" : "Despesa",
            `"${t.description.replace(/"/g, '""')}"`,
            t.category,
            t.amount,
            t.currency,
            t.date,
            t.bankAccount || "Local"
          ].join(";");
          csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `easyfinance-extrato-${new Date().toISOString().split("T")[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Extrato CSV baixado com sucesso!");
      };

      // Trigger standard print optimized layout
      const handlePrintReport = () => {
        window.print();
      };

      // AI Advisor Smart Assistant Chat Response
      const handleSendAiMessage = async () => {
        if (!aiInput.trim()) return;

        const userText = aiInput;
        const newUserMsg = { id: "msg_" + Math.random().toString(36).substring(2, 9), sender: "user", text: userText };
        setAiMessages(prev => [...prev, newUserMsg]);
        setAiInput("");
        setAiLoading(true);

        try {
          // Attempt call to backend server endpoint first (AI Studio Cloud Run API integration)
          const response = await fetch("/api/ai/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: userText,
              transactions,
              boletos,
              currency: selectedCurrency
            })
          });

          if (response.ok) {
            const data = await response.json();
            setAiMessages(prev => [...prev, { id: "msg_" + Math.random().toString(36).substring(2, 9), sender: "ai", text: data.text }]);
          } else {
            throw new Error("Local fallback required.");
          }
        } catch (err) {
          // Autonomous client-side intelligent local AI fallback (in case they double-click and run locally)
          setTimeout(() => {
            let aiReply = "Peço desculpas, não consegui acessar o servidor central no momento. No entanto, analisando seus dados de carteira local:";
            const query = userText.toLowerCase();

            if (query.includes("gasto") || query.includes("limite") || query.includes("categoria") || query.includes("alimentação")) {
              const maxCat = Object.keys(categoryTotals).reduce((a, b) => categoryTotals[a] > categoryTotals[b] ? a : b, "Nenhuma");
              aiReply = `Sua despesa acumulada é de ${exchangeRates[selectedCurrency].symbol} ${totalExpense.toFixed(2)}. Sua maior categoria de consumo é **${maxCat}**, com o total de ${exchangeRates[selectedCurrency].symbol} ${(categoryTotals[maxCat] || 0).toFixed(2)}. Tente planejar suas saídas para não estourar a meta mensal recomendada de ${exchangeRates[selectedCurrency].symbol} 3.000,00!`;
            } else if (query.includes("saldo") || query.includes("guardar") || query.includes("investir") || query.includes("economizar")) {
              aiReply = `Seu saldo líquido atual é de **${exchangeRates[selectedCurrency].symbol} ${netBalance.toFixed(2)}**. Com base no seu índice de poupança, você está economizando ${netBalance > 0 ? ((netBalance / totalIncome) * 100).toFixed(0) : 0}% de suas receitas. Dica: tente transferir pelo menos 15% do seu saldo para investimentos de liquidez diária via Open Finance!`;
            } else if (query.includes("boleto") || query.includes("vencer") || query.includes("pagar")) {
              const pendingBoletos = boletos.filter(b => !b.paid);
              if (pendingBoletos.length > 0) {
                aiReply = `Você possui **${pendingBoletos.length} boletos em aberto** aguardando pagamento. O boleto mais próximo é o "${pendingBoletos[0].title}" de R$ ${pendingBoletos[0].amount.toFixed(2)} que vence em ${pendingBoletos[0].dueDate}. Recomendo pagá-lo clicando no botão "Pagar" para evitar multas de mora.`;
              } else {
                aiReply = `Excelente notícia! Todos os seus boletos de faturamento cadastrados via CPF no DDA estão quitados. Ótimo controle fiscal!`;
              }
            } else {
              aiReply = `Olá! Analisei sua carteira do EasyFinance. Atualmente você possui um saldo consolidado de **${exchangeRates[selectedCurrency].symbol} ${netBalance.toFixed(2)}** (${transactions.length} transações). Suas receitas somam ${exchangeRates[selectedCurrency].symbol} ${totalIncome.toFixed(2)} e despesas ${exchangeRates[selectedCurrency].symbol} ${totalExpense.toFixed(2)}. Como posso ajudá-lo a otimizar este planejamento?`;
            }

            setAiMessages(prev => [...prev, { id: "msg_" + Math.random().toString(36).substring(2, 9), sender: "ai", text: aiReply }]);
          }, 1200);
        } finally {
          setAiLoading(false);
        }
      };

      // Preset Quick Chat Queries
      const handleQuickChatPrompt = (promptText) => {
        setAiInput(promptText);
      };

      // Filtered Transactions for the main logger list view
      const filteredTransactions = useMemo(() => {
        return transactions.filter(t => {
          if (filterCategory !== "todas" && t.category.toLowerCase() !== filterCategory.toLowerCase()) return false;
          if (filterType !== "todos" && t.type !== filterType) return false;
          return true;
        });
      }, [transactions, filterCategory, filterType]);

      // -----------------------------------------------------------------
      // RENDER SECTION 1: SECURE PIN LOCK SCREEN (PIN 1505)
      // -----------------------------------------------------------------
      if (!isUnlocked) {
        return (
          <div className="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#050505] text-[#e4e4e7] p-6 overflow-hidden">
            {/* Elegant Background ambient glows */}
            <div className="absolute inset-0 z-0 opacity-10">
              <div className="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-cyan-500 rounded-full filter blur-[150px] animate-pulse-slow" />
              <div className="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600 rounded-full filter blur-[150px] animate-pulse-slow" />
              <div className="absolute inset-0 bg-[linear-gradient(to_right,#111_1px,transparent_1px),linear-gradient(to_bottom,#111_1px,transparent_1px)] bg-[size:4rem_4rem]" />
            </div>

            <div className="relative z-10 w-full max-w-sm bg-[#0d0d0e] rounded-2xl border border-[#1a1a1a] shadow-2xl p-8 flex flex-col items-center">
              {/* Brand Title Banner */}
              <div className="flex items-center gap-2.5 mb-8">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg">
                  <span className="text-black font-black text-2xl italic tracking-wider">E</span>
                </div>

                  </div>

                  <div className="flex gap-2.5 pt-2">
                    <button 
                      type="button" 
                      onClick={() => setShowConnectModal(false)}
                      className="flex-1 py-2.5 rounded-xl border border-[#1a1a1a] text-slate-400 hover:text-white hover:bg-[#111] text-xs font-semibold cursor-pointer"
                    >
                      Cancelar
                    </button>
                    <button 
                      type="submit"
                      disabled={isConnecting}
                      className="flex-1 py-2.5 rounded-xl bg-white hover:bg-slate-200 text-slate-950 text-xs font-black uppercase tracking-wider cursor-pointer active:scale-95 disabled:opacity-50"
                    >
                      {isConnecting ? "Sincronizando..." : "Autorizar API"}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Footer view indicator */}
          <footer className="p-6 mt-12 border-t border-[#1a1a1a] text-center text-[10px] font-mono text-[#555] flex flex-col md:flex-row items-center justify-between gap-4 max-w-7xl mx-auto bg-[#050505] no-print">
            <span>EasyFinance © 2026. Todos os direitos reservados de forma resiliente.</span>
            <div className="flex gap-4">
              <span>Open Finance BCB ativa</span>
              <span>Encriptado AES-256</span>
              <span>Local Database Ativo</span>
            </div>
          </footer>

        </div>
      );
    }

    // Mount to root element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
